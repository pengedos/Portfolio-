<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Road -->
  <path d="M0 70 Q50 60 100 70" stroke="#38BDF8" stroke-width="2" opacity="0.3"/>
  <path d="M0 75 Q50 65 100 75" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  
  <!-- Truck body -->
  <g class="truck" transform="translate(20, 35)">
    <!-- Trailer -->
    <rect x="0" y="5" width="40" height="25" rx="2" stroke="#38BDF8" stroke-width="2"/>
    <!-- Cabin -->
    <rect x="40" y="10" width="18" height="20" rx="2" stroke="#38BDF8" stroke-width="2"/>
    <!-- Window -->
    <rect x="44" y="14" width="10" height="8" fill="#38BDF8" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="12" cy="32" r="5" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="32" cy="32" r="5" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="50" cy="32" r="5" stroke="#3B82F6" stroke-width="2"/>
  </g>
  
  <!-- Speed lines -->
  <line class="speed-line" x1="5" y1="45" x2="15" y2="45" stroke="#38BDF8" stroke-width="2" opacity="0.6"/>
  <line class="speed-line" x1="0" y1="50" x2="12" y2="50" stroke="#3B82F6" stroke-width="2" opacity="0.6"/>
  <line class="speed-line" x1="8" y1="55" x2="18" y2="55" stroke="#38BDF8" stroke-width="2" opacity="0.6"/>
</svg>