<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Load Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 8px; }
        .pass { background: #1a472a; border: 1px solid #22c55e; }
        .fail { background: #4a1c1c; border: 1px solid #ef4444; }
        .info { background: #1e3a5f; border: 1px solid #3b82f6; }
    </style>
</head>
<body>
    <h1>Portfolio Load Test</h1>
    <div id="results"></div>
    
    <script>
        var results = document.getElementById('results');
        
        function addResult(test, status, message) {
            var div = document.createElement('div');
            div.className = 'test-result ' + status;
            div.innerHTML = '<strong>' + test + ':</strong> ' + message;
            results.appendChild(div);
        }
        
        // Test 1: Check if main portfolio file loads
        addResult('Main File', 'info', 'Checking index.html...');
        
        // Test 2: Check for JavaScript errors
        window.onerror = function(msg, url, line) {
            addResult('JavaScript Error', 'fail', msg + ' at line ' + line);
            return false;
        };
        
        // Test 3: Check if key elements exist
        setTimeout(function() {
            var header = document.getElementById('header');
            var main = document.getElementById('main');
            var footer = document.querySelector('footer');
            
            if (header) addResult('Header', 'pass', 'Header element found');
            else addResult('Header', 'fail', 'Header element NOT found');
            
            if (main) addResult('Main Content', 'pass', 'Main element found');
            else addResult('Main Content', 'fail', 'Main element NOT found');
            
            if (footer) addResult('Footer', 'pass', 'Footer element found');
            else addResult('Footer', 'fail', 'Footer element NOT found');
            
            // Test 4: Check for sections
            var sections = document.querySelectorAll('section');
            addResult('Sections', 'pass', 'Found ' + sections.length + ' sections');
            
            // Test 5: Check for fade-in elements
            var fadeElements = document.querySelectorAll('.fade-in');
            addResult('Fade-in Elements', 'info', 'Found ' + fadeElements.length + ' elements with fade-in class');
            
            // Test 6: Check if no-js class was removed
            var html = document.documentElement;
            if (!html.classList.contains('no-js')) {
                addResult('No-JS Fallback', 'pass', 'no-js class removed (JS executing)');
            } else {
                addResult('No-JS Fallback', 'info', 'no-js class still present (JS may not have loaded)');
            }
            
            addResult('Test Complete', 'info', 'Open browser console for detailed errors');
            
        }, 100);
    </script>
</body>
</html>
